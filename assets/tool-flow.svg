<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" width="900" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07090f"/>
      <stop offset="100%" style="stop-color:#0d1220"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4f8ef7"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00d4aa"/>
    </marker>
  </defs>

  <rect width="900" height="400" fill="url(#bg)" rx="16"/>
  <g opacity="0.04" stroke="#7b61ff" stroke-width="1">
    <line x1="0" y1="80" x2="900" y2="80"/><line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="240" x2="900" y2="240"/><line x1="0" y1="320" x2="900" y2="320"/>
    <line x1="150" y1="0" x2="150" y2="400"/><line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="450" y1="0" x2="450" y2="400"/><line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="750" y1="0" x2="750" y2="400"/>
  </g>

  <text x="450" y="36" font-family="'Courier New', monospace" font-size="14" font-weight="700"
        fill="#ffffff" text-anchor="middle" letter-spacing="4" filter="url(#glow)">TOOL INTERACTION FLOW</text>
  <line x1="200" y1="44" x2="700" y2="44" stroke="#7b61ff" stroke-width="0.5" opacity="0.4"/>

  <!-- Step boxes with 3D effect -->
  <!-- Box 1: User -->
  <polygon points="55,75 175,75 183,83 183,163 63,163 55,155" fill="#0a0515" opacity="0.7"/>
  <rect x="55" y="65" width="120" height="90" rx="8" fill="#1a0a30" stroke="#7b61ff" stroke-width="1.5" filter="url(#glow)"/>
  <rect x="55" y="65" width="120" height="24" rx="8" fill="#7b61ff" opacity="0.25"/>
  <text x="115" y="82" font-family="'Courier New', monospace" font-size="9" font-weight="700" fill="#a78bfa" text-anchor="middle" letter-spacing="2">USER</text>
  <text x="115" y="108" font-family="'Courier New', monospace" font-size="20" fill="#7b61ff" text-anchor="middle" filter="url(#glow)">@</text>
  <text x="115" y="140" font-family="'Courier New', monospace" font-size="8" fill="#a78bfa" text-anchor="middle" opacity="0.8">Claude Desktop</text>

  <!-- Arrow 1 -->
  <line x1="175" y1="110" x2="215" y2="110" stroke="#7b61ff" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="195" y="103" font-family="'Courier New', monospace" font-size="7" fill="#7b61ff" text-anchor="middle">prompt</text>

  <!-- Box 2: discover_services -->
  <polygon points="215,75 355,75 363,83 363,163 223,163 215,155" fill="#050a14" opacity="0.7"/>
  <rect x="215" y="65" width="140" height="90" rx="8" fill="#0a1828" stroke="#4f8ef7" stroke-width="1.5" filter="url(#glow)"/>
  <rect x="215" y="65" width="140" height="24" rx="8" fill="#4f8ef7" opacity="0.2"/>
  <text x="285" y="82" font-family="'Courier New', monospace" font-size="9" font-weight="700" fill="#7dd3fc" text-anchor="middle" letter-spacing="1">DISCOVER</text>
  <text x="285" y="108" font-family="'Courier New', monospace" font-size="9" fill="#4f8ef7" text-anchor="middle">discover_services</text>
  <rect x="230" y="118" width="110" height="16" rx="3" fill="#0a2040" stroke="#4f8ef7" stroke-width="0.5"/>
  <text x="285" y="130" font-family="'Courier New', monospace" font-size="7" fill="#7dd3fc" text-anchor="middle">returns 6 services</text>
  <text x="285" y="148" font-family="'Courier New', monospace" font-size="7" fill="#4f8ef7" text-anchor="middle" opacity="0.7">with prices + URLs</text>

  <!-- Arrow 2 -->
  <line x1="355" y1="110" x2="395" y2="110" stroke="#4f8ef7" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="375" y="103" font-family="'Courier New', monospace" font-size="7" fill="#4f8ef7" text-anchor="middle">select</text>

  <!-- Box 3: x402_probe -->
  <polygon points="395,75 535,75 543,83 543,163 403,163 395,155" fill="#050a14" opacity="0.7"/>
  <rect x="395" y="65" width="140" height="90" rx="8" fill="#0a1828" stroke="#4f8ef7" stroke-width="1.5"/>
  <rect x="395" y="65" width="140" height="24" rx="8" fill="#4f8ef7" opacity="0.2"/>
  <text x="465" y="82" font-family="'Courier New', monospace" font-size="9" font-weight="700" fill="#7dd3fc" text-anchor="middle" letter-spacing="1">PROBE</text>
  <text x="465" y="108" font-family="'Courier New', monospace" font-size="9" fill="#4f8ef7" text-anchor="middle">x402_probe</text>
  <rect x="410" y="118" width="110" height="16" rx="3" fill="#0a2040" stroke="#4f8ef7" stroke-width="0.5"/>
  <text x="465" y="130" font-family="'Courier New', monospace" font-size="7" fill="#7dd3fc" text-anchor="middle">HTTP 402 received</text>
  <text x="465" y="148" font-family="'Courier New', monospace" font-size="7" fill="#4f8ef7" text-anchor="middle" opacity="0.7">price confirmed</text>

  <!-- Arrow 3 -->
  <line x1="535" y1="110" x2="575" y2="110" stroke="#00d4aa" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="555" y="103" font-family="'Courier New', monospace" font-size="7" fill="#00d4aa" text-anchor="middle">pay</text>

  <!-- Box 4: x402_fetch -->
  <polygon points="575,75 715,75 723,83 723,163 583,163 575,155" fill="#001a10" opacity="0.7"/>
  <rect x="575" y="65" width="140" height="90" rx="8" fill="#001a14" stroke="#00d4aa" stroke-width="1.5" filter="url(#glow)"/>
  <rect x="575" y="65" width="140" height="24" rx="8" fill="#00d4aa" opacity="0.2"/>
  <text x="645" y="82" font-family="'Courier New', monospace" font-size="9" font-weight="700" fill="#6ee7b7" text-anchor="middle" letter-spacing="1">FETCH + PAY</text>
  <text x="645" y="108" font-family="'Courier New', monospace" font-size="9" fill="#00d4aa" text-anchor="middle">x402_fetch</text>
  <rect x="590" y="118" width="110" height="16" rx="3" fill="#002a1a" stroke="#00d4aa" stroke-width="0.5"/>
  <text x="645" y="130" font-family="'Courier New', monospace" font-size="7" fill="#6ee7b7" text-anchor="middle">USDC settled on</text>
  <text x="645" y="148" font-family="'Courier New', monospace" font-size="7" fill="#00d4aa" text-anchor="middle" opacity="0.7">Stellar testnet</text>

  <!-- Arrow 4 -->
  <line x1="715" y1="110" x2="755" y2="110" stroke="#00d4aa" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="735" y="103" font-family="'Courier New', monospace" font-size="7" fill="#00d4aa" text-anchor="middle">data</text>

  <!-- Box 5: Result -->
  <polygon points="755,75 875,75 883,83 883,163 763,163 755,155" fill="#0a0515" opacity="0.7"/>
  <rect x="755" y="65" width="120" height="90" rx="8" fill="#1a0a30" stroke="#7b61ff" stroke-width="1.5" filter="url(#glow)"/>
  <rect x="755" y="65" width="120" height="24" rx="8" fill="#7b61ff" opacity="0.25"/>
  <text x="815" y="82" font-family="'Courier New', monospace" font-size="9" font-weight="700" fill="#a78bfa" text-anchor="middle" letter-spacing="2">RESULT</text>
  <text x="815" y="108" font-family="'Courier New', monospace" font-size="8" fill="#c4b5fd" text-anchor="middle">Synthesized</text>
  <text x="815" y="122" font-family="'Courier New', monospace" font-size="8" fill="#c4b5fd" text-anchor="middle">response</text>
  <text x="815" y="140" font-family="'Courier New', monospace" font-size="8" fill="#7b61ff" text-anchor="middle" opacity="0.8">+ tx hashes</text>

  <!-- Bottom: wallet_balance tool -->
  <rect x="55" y="200" width="830" height="80" rx="10" fill="#050810" stroke="#4f8ef7" stroke-width="0.8" opacity="0.7"/>
  <text x="450" y="222" font-family="'Courier New', monospace" font-size="10" font-weight="700" fill="#4f8ef7" text-anchor="middle" letter-spacing="3">wallet_balance TOOL</text>

  <rect x="80" y="232" width="180" height="32" rx="5" fill="#0a1828" stroke="#4f8ef7" stroke-width="0.8"/>
  <text x="170" y="248" font-family="'Courier New', monospace" font-size="8" fill="#7dd3fc" text-anchor="middle">Horizon API lookup</text>
  <text x="170" y="260" font-family="'Courier New', monospace" font-size="7" fill="#4f8ef7" text-anchor="middle" opacity="0.7">soroban-testnet.stellar.org</text>

  <line x1="260" y1="248" x2="300" y2="248" stroke="#4f8ef7" stroke-width="1" marker-end="url(#arrowBlue)"/>

  <rect x="300" y="232" width="180" height="32" rx="5" fill="#0a1828" stroke="#00d4aa" stroke-width="0.8"/>
  <text x="390" y="248" font-family="'Courier New', monospace" font-size="8" fill="#6ee7b7" text-anchor="middle">XLM + USDC balances</text>
  <text x="390" y="260" font-family="'Courier New', monospace" font-size="7" fill="#00d4aa" text-anchor="middle" opacity="0.7">native + credit_alphanum4</text>

  <line x1="480" y1="248" x2="520" y2="248" stroke="#4f8ef7" stroke-width="1" marker-end="url(#arrowBlue)"/>

  <rect x="520" y="232" width="340" height="32" rx="5" fill="#0a1828" stroke="#7b61ff" stroke-width="0.8"/>
  <text x="690" y="248" font-family="'Courier New', monospace" font-size="8" fill="#a78bfa" text-anchor="middle">Wallet: G... | XLM: 9,999.99 | USDC: 9.97</text>
  <text x="690" y="260" font-family="'Courier New', monospace" font-size="7" fill="#7b61ff" text-anchor="middle" opacity="0.7">returned to agent as text</text>

  <!-- Legend -->
  <rect x="55" y="310" width="830" height="70" rx="8" fill="#050810" stroke="#4f8ef7" stroke-width="0.5" opacity="0.6"/>
  <text x="450" y="330" font-family="'Courier New', monospace" font-size="9" font-weight="700" fill="#4f8ef7" text-anchor="middle" letter-spacing="3" opacity="0.8">TOOL REFERENCE</text>

  <circle cx="90" cy="355" r="5" fill="#4f8ef7" filter="url(#glow)"/>
  <text x="102" y="359" font-family="'Courier New', monospace" font-size="8" fill="#7dd3fc">discover_services — no params, returns service catalog</text>

  <circle cx="90" cy="372" r="5" fill="#00d4aa" filter="url(#glow)"/>
  <text x="102" y="376" font-family="'Courier New', monospace" font-size="8" fill="#6ee7b7">x402_fetch — url, method, body — auto-pays HTTP 402</text>

  <circle cx="470" cy="355" r="5" fill="#7b61ff" filter="url(#glow)"/>
  <text x="482" y="359" font-family="'Courier New', monospace" font-size="8" fill="#a78bfa">x402_probe — url — preview price without paying</text>

  <circle cx="470" cy="372" r="5" fill="#f59e0b" filter="url(#glow)"/>
  <text x="482" y="376" font-family="'Courier New', monospace" font-size="8" fill="#fcd34d">wallet_balance — no params — USDC + XLM balance</text>
</svg>
