<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07090f"/>
      <stop offset="100%" style="stop-color:#0d1220"/>
    </linearGradient>
    <linearGradient id="agentBox" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1040"/>
      <stop offset="100%" style="stop-color:#0d0828"/>
    </linearGradient>
    <linearGradient id="mcpBox" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a2040"/>
      <stop offset="100%" style="stop-color:#051428"/>
    </linearGradient>
    <linearGradient id="stellarBox" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003328"/>
      <stop offset="100%" style="stop-color:#001a14"/>
    </linearGradient>
    <linearGradient id="apiBox" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a30"/>
      <stop offset="100%" style="stop-color:#0d0520"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="boxglow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4f8ef7"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00d4aa"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7b61ff"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="url(#bg)" rx="16"/>

  <!-- Grid -->
  <g opacity="0.04" stroke="#7b61ff" stroke-width="1">
    <line x1="0" y1="65" x2="900" y2="65"/>
    <line x1="0" y1="130" x2="900" y2="130"/>
    <line x1="0" y1="195" x2="900" y2="195"/>
    <line x1="0" y1="260" x2="900" y2="260"/>
    <line x1="0" y1="325" x2="900" y2="325"/>
    <line x1="0" y1="390" x2="900" y2="390"/>
    <line x1="0" y1="455" x2="900" y2="455"/>
    <line x1="90" y1="0" x2="90" y2="520"/>
    <line x1="180" y1="0" x2="180" y2="520"/>
    <line x1="270" y1="0" x2="270" y2="520"/>
    <line x1="360" y1="0" x2="360" y2="520"/>
    <line x1="450" y1="0" x2="450" y2="520"/>
    <line x1="540" y1="0" x2="540" y2="520"/>
    <line x1="630" y1="0" x2="630" y2="520"/>
    <line x1="720" y1="0" x2="720" y2="520"/>
    <line x1="810" y1="0" x2="810" y2="520"/>
  </g>

  <!-- Title -->
  <text x="450" y="38" font-family="'Courier New', monospace" font-size="16" font-weight="700"
        fill="#ffffff" text-anchor="middle" letter-spacing="4" filter="url(#glow)">x402 STELLAR MCP — ARCHITECTURE</text>
  <line x1="200" y1="48" x2="700" y2="48" stroke="#7b61ff" stroke-width="0.5" opacity="0.4"/>

  <!-- ── Layer 1: AI Agent (left) ── -->
  <!-- 3D box effect -->
  <polygon points="55,82 235,82 245,92 245,212 65,212 55,202" fill="#0f0830" opacity="0.6"/>
  <rect x="55" y="72" width="180" height="130" rx="8" fill="url(#agentBox)" stroke="#7b61ff" stroke-width="1.5" filter="url(#boxglow)"/>
  <rect x="55" y="72" width="180" height="28" rx="8" fill="#7b61ff" opacity="0.2"/>
  <text x="145" y="91" font-family="'Courier New', monospace" font-size="10" font-weight="700"
        fill="#7b61ff" text-anchor="middle" letter-spacing="2">AI AGENT</text>

  <!-- Claude icon simplified -->
  <circle cx="145" cy="135" r="28" fill="#7b61ff" opacity="0.15" stroke="#7b61ff" stroke-width="1"/>
  <text x="145" y="130" font-family="'Courier New', monospace" font-size="11" fill="#c4b5fd" text-anchor="middle">Claude</text>
  <text x="145" y="146" font-family="'Courier New', monospace" font-size="9" fill="#7b61ff" text-anchor="middle" opacity="0.8">Desktop</text>

  <text x="145" y="188" font-family="'Courier New', monospace" font-size="8" fill="#a78bfa" text-anchor="middle" opacity="0.7">MCP Client</text>

  <!-- ── Layer 2: MCP Server (center-left) ── -->
  <polygon points="295,62 535,62 545,72 545,232 305,232 295,222" fill="#051020" opacity="0.6"/>
  <rect x="295" y="52" width="240" height="170" rx="8" fill="url(#mcpBox)" stroke="#4f8ef7" stroke-width="1.5" filter="url(#boxglow)"/>
  <rect x="295" y="52" width="240" height="28" rx="8" fill="#4f8ef7" opacity="0.2"/>
  <text x="415" y="71" font-family="'Courier New', monospace" font-size="10" font-weight="700"
        fill="#4f8ef7" text-anchor="middle" letter-spacing="2">x402 MCP SERVER</text>

  <!-- Tools inside MCP box -->
  <rect x="310" y="90" width="100" height="26" rx="4" fill="#0a2040" stroke="#4f8ef7" stroke-width="0.8" opacity="0.8"/>
  <text x="360" y="107" font-family="'Courier New', monospace" font-size="8" fill="#7dd3fc" text-anchor="middle">discover_services</text>

  <rect x="420" y="90" width="100" height="26" rx="4" fill="#0a2040" stroke="#4f8ef7" stroke-width="0.8" opacity="0.8"/>
  <text x="470" y="107" font-family="'Courier New', monospace" font-size="8" fill="#7dd3fc" text-anchor="middle">x402_fetch</text>

  <rect x="310" y="126" width="100" height="26" rx="4" fill="#0a2040" stroke="#4f8ef7" stroke-width="0.8" opacity="0.8"/>
  <text x="360" y="143" font-family="'Courier New', monospace" font-size="8" fill="#7dd3fc" text-anchor="middle">x402_probe</text>

  <rect x="420" y="126" width="100" height="26" rx="4" fill="#0a2040" stroke="#4f8ef7" stroke-width="0.8" opacity="0.8"/>
  <text x="470" y="143" font-family="'Courier New', monospace" font-size="8" fill="#7dd3fc" text-anchor="middle">wallet_balance</text>

  <!-- x402 client label -->
  <rect x="330" y="165" width="170" height="22" rx="4" fill="#4f8ef7" opacity="0.1" stroke="#4f8ef7" stroke-width="0.5"/>
  <text x="415" y="180" font-family="'Courier New', monospace" font-size="8" fill="#4f8ef7" text-anchor="middle" opacity="0.8">@x402/fetch + @x402/stellar</text>

  <!-- ── Layer 3: Stellar Network (center-right) ── -->
  <polygon points="585,82 775,82 785,92 785,282 595,282 585,272" fill="#001a10" opacity="0.6"/>
  <rect x="585" y="72" width="190" height="200" rx="8" fill="url(#stellarBox)" stroke="#00d4aa" stroke-width="1.5" filter="url(#boxglow)"/>
  <rect x="585" y="72" width="190" height="28" rx="8" fill="#00d4aa" opacity="0.15"/>
  <text x="680" y="91" font-family="'Courier New', monospace" font-size="10" font-weight="700"
        fill="#00d4aa" text-anchor="middle" letter-spacing="2">STELLAR TESTNET</text>

  <!-- Stellar star -->
  <g transform="translate(680,145)" filter="url(#glow)">
    <polygon points="0,-22 5,-8 20,-8 9,2 13,18 0,9 -13,18 -9,2 -20,-8 -5,-8" fill="#00d4aa" opacity="0.9"/>
  </g>

  <text x="680" y="185" font-family="'Courier New', monospace" font-size="8" fill="#6ee7b7" text-anchor="middle">Native USDC</text>
  <text x="680" y="200" font-family="'Courier New', monospace" font-size="8" fill="#6ee7b7" text-anchor="middle">5s settlement</text>
  <text x="680" y="215" font-family="'Courier New', monospace" font-size="8" fill="#6ee7b7" text-anchor="middle">$0.00001 fee</text>

  <!-- Facilitator label -->
  <rect x="605" y="232" width="150" height="22" rx="4" fill="#00d4aa" opacity="0.1" stroke="#00d4aa" stroke-width="0.5"/>
  <text x="680" y="247" font-family="'Courier New', monospace" font-size="8" fill="#00d4aa" text-anchor="middle" opacity="0.8">OpenZeppelin Facilitator</text>

  <!-- ── Layer 4: Paid APIs (right) ── -->
  <polygon points="815,72 895,72 895,282 815,282" fill="#0d0520" opacity="0.4"/>
  <rect x="815" y="72" width="70" height="200" rx="8" fill="url(#apiBox)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="850" y="91" font-family="'Courier New', monospace" font-size="8" font-weight="700"
        fill="#a78bfa" text-anchor="middle" letter-spacing="1">APIS</text>

  <rect x="824" y="102" width="52" height="18" rx="3" fill="#1a0a30" stroke="#a78bfa" stroke-width="0.6"/>
  <text x="850" y="115" font-family="'Courier New', monospace" font-size="7" fill="#c4b5fd" text-anchor="middle">Crypto</text>

  <rect x="824" y="128" width="52" height="18" rx="3" fill="#1a0a30" stroke="#a78bfa" stroke-width="0.6"/>
  <text x="850" y="141" font-family="'Courier New', monospace" font-size="7" fill="#c4b5fd" text-anchor="middle">News</text>

  <rect x="824" y="154" width="52" height="18" rx="3" fill="#1a0a30" stroke="#a78bfa" stroke-width="0.6"/>
  <text x="850" y="167" font-family="'Courier New', monospace" font-size="7" fill="#c4b5fd" text-anchor="middle">Weather</text>

  <rect x="824" y="180" width="52" height="18" rx="3" fill="#1a0a30" stroke="#a78bfa" stroke-width="0.6"/>
  <text x="850" y="193" font-family="'Courier New', monospace" font-size="7" fill="#c4b5fd" text-anchor="middle">AI Infer.</text>

  <rect x="824" y="206" width="52" height="18" rx="3" fill="#1a0a30" stroke="#a78bfa" stroke-width="0.6"/>
  <text x="850" y="219" font-family="'Courier New', monospace" font-size="7" fill="#c4b5fd" text-anchor="middle">Web Ext.</text>

  <rect x="824" y="232" width="52" height="18" rx="3" fill="#1a0a30" stroke="#a78bfa" stroke-width="0.6"/>
  <text x="850" y="245" font-family="'Courier New', monospace" font-size="7" fill="#c4b5fd" text-anchor="middle">Image</text>

  <!-- ── Arrows ── -->
  <!-- Agent to MCP (stdio) -->
  <line x1="235" y1="137" x2="290" y2="137" stroke="#7b61ff" stroke-width="2" marker-end="url(#arrowPurple)" filter="url(#glow)"/>
  <text x="262" y="128" font-family="'Courier New', monospace" font-size="7" fill="#7b61ff" text-anchor="middle">stdio</text>

  <!-- MCP to Stellar (payment) -->
  <line x1="535" y1="160" x2="580" y2="160" stroke="#00d4aa" stroke-width="2" marker-end="url(#arrowGreen)" filter="url(#glow)"/>
  <text x="557" y="151" font-family="'Courier New', monospace" font-size="7" fill="#00d4aa" text-anchor="middle">USDC</text>

  <!-- MCP to APIs (HTTP) -->
  <line x1="535" y1="110" x2="810" y2="110" stroke="#4f8ef7" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowBlue)"/>
  <text x="672" y="103" font-family="'Courier New', monospace" font-size="7" fill="#4f8ef7" text-anchor="middle">HTTP request</text>

  <!-- APIs to MCP (response) -->
  <line x1="810" y1="125" x2="535" y2="125" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowPurple)"/>
  <text x="672" y="138" font-family="'Courier New', monospace" font-size="7" fill="#a78bfa" text-anchor="middle">200 OK + data</text>

  <!-- ── Payment Flow (bottom) ── -->
  <rect x="55" y="310" width="830" height="185" rx="10" fill="#050810" stroke="#4f8ef7" stroke-width="0.8" opacity="0.6"/>
  <text x="450" y="332" font-family="'Courier New', monospace" font-size="10" font-weight="700"
        fill="#4f8ef7" text-anchor="middle" letter-spacing="3">x402 PAYMENT FLOW</text>

  <!-- Flow steps -->
  <!-- Step 1 -->
  <rect x="72" y="345" width="120" height="50" rx="6" fill="#0a0820" stroke="#7b61ff" stroke-width="1"/>
  <text x="132" y="364" font-family="'Courier New', monospace" font-size="8" fill="#7b61ff" text-anchor="middle" font-weight="700">1. REQUEST</text>
  <text x="132" y="378" font-family="'Courier New', monospace" font-size="7" fill="#a78bfa" text-anchor="middle">GET /paid-endpoint</text>
  <text x="132" y="390" font-family="'Courier New', monospace" font-size="7" fill="#a78bfa" text-anchor="middle" opacity="0.7">no payment yet</text>

  <line x1="192" y1="370" x2="222" y2="370" stroke="#4f8ef7" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Step 2 -->
  <rect x="222" y="345" width="120" height="50" rx="6" fill="#0a0820" stroke="#4f8ef7" stroke-width="1"/>
  <text x="282" y="364" font-family="'Courier New', monospace" font-size="8" fill="#4f8ef7" text-anchor="middle" font-weight="700">2. HTTP 402</text>
  <text x="282" y="378" font-family="'Courier New', monospace" font-size="7" fill="#7dd3fc" text-anchor="middle">price: $0.01 USDC</text>
  <text x="282" y="390" font-family="'Courier New', monospace" font-size="7" fill="#7dd3fc" text-anchor="middle" opacity="0.7">network: stellar:testnet</text>

  <line x1="342" y1="370" x2="372" y2="370" stroke="#4f8ef7" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Step 3 -->
  <rect x="372" y="345" width="120" height="50" rx="6" fill="#0a0820" stroke="#00d4aa" stroke-width="1"/>
  <text x="432" y="364" font-family="'Courier New', monospace" font-size="8" fill="#00d4aa" text-anchor="middle" font-weight="700">3. SIGN</text>
  <text x="432" y="378" font-family="'Courier New', monospace" font-size="7" fill="#6ee7b7" text-anchor="middle">Soroban auth entry</text>
  <text x="432" y="390" font-family="'Courier New', monospace" font-size="7" fill="#6ee7b7" text-anchor="middle" opacity="0.7">Ed25519 keypair</text>

  <line x1="492" y1="370" x2="522" y2="370" stroke="#00d4aa" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Step 4 -->
  <rect x="522" y="345" width="120" height="50" rx="6" fill="#0a0820" stroke="#00d4aa" stroke-width="1"/>
  <text x="582" y="364" font-family="'Courier New', monospace" font-size="8" fill="#00d4aa" text-anchor="middle" font-weight="700">4. SETTLE</text>
  <text x="582" y="378" font-family="'Courier New', monospace" font-size="7" fill="#6ee7b7" text-anchor="middle">Facilitator on-chain</text>
  <text x="582" y="390" font-family="'Courier New', monospace" font-size="7" fill="#6ee7b7" text-anchor="middle" opacity="0.7">~5 seconds</text>

  <line x1="642" y1="370" x2="672" y2="370" stroke="#00d4aa" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Step 5 -->
  <rect x="672" y="345" width="120" height="50" rx="6" fill="#0a0820" stroke="#7b61ff" stroke-width="1"/>
  <text x="732" y="364" font-family="'Courier New', monospace" font-size="8" fill="#7b61ff" text-anchor="middle" font-weight="700">5. RETRY</text>
  <text x="732" y="378" font-family="'Courier New', monospace" font-size="7" fill="#a78bfa" text-anchor="middle">X-PAYMENT header</text>
  <text x="732" y="390" font-family="'Courier New', monospace" font-size="7" fill="#a78bfa" text-anchor="middle" opacity="0.7">200 OK + data</text>

  <!-- Stats bar -->
  <rect x="72" y="415" width="780" height="60" rx="6" fill="#050a14" stroke="#4f8ef7" stroke-width="0.5" opacity="0.8"/>

  <text x="180" y="438" font-family="'Courier New', monospace" font-size="9" fill="#4f8ef7" text-anchor="middle" opacity="0.7">SETTLEMENT TIME</text>
  <text x="180" y="458" font-family="'Courier New', monospace" font-size="16" font-weight="700" fill="#00d4aa" text-anchor="middle" filter="url(#glow)">5s</text>

  <line x1="290" y1="420" x2="290" y2="470" stroke="#4f8ef7" stroke-width="0.5" opacity="0.3"/>

  <text x="390" y="438" font-family="'Courier New', monospace" font-size="9" fill="#4f8ef7" text-anchor="middle" opacity="0.7">TRANSACTION FEE</text>
  <text x="390" y="458" font-family="'Courier New', monospace" font-size="16" font-weight="700" fill="#00d4aa" text-anchor="middle" filter="url(#glow)">$0.00001</text>

  <line x1="500" y1="420" x2="500" y2="470" stroke="#4f8ef7" stroke-width="0.5" opacity="0.3"/>

  <text x="610" y="438" font-family="'Courier New', monospace" font-size="9" fill="#4f8ef7" text-anchor="middle" opacity="0.7">STABLECOIN</text>
  <text x="610" y="458" font-family="'Courier New', monospace" font-size="16" font-weight="700" fill="#00d4aa" text-anchor="middle" filter="url(#glow)">USDC</text>

  <line x1="720" y1="420" x2="720" y2="470" stroke="#4f8ef7" stroke-width="0.5" opacity="0.3"/>

  <text x="800" y="438" font-family="'Courier New', monospace" font-size="9" fill="#4f8ef7" text-anchor="middle" opacity="0.7">NETWORK UPTIME</text>
  <text x="800" y="458" font-family="'Courier New', monospace" font-size="16" font-weight="700" fill="#00d4aa" text-anchor="middle" filter="url(#glow)">99.99%</text>
</svg>
